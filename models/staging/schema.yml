version: 2

models:
  - name: stg_orders
    description: "Cleaned orders data from raw source. One row per order."
    columns:
      - name: order_id
        description: "Unique identifier for each order"
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to stg_customers"
        tests:
          - not_null
      - name: order_status
        description: "Current status of the order"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'canceled', 'unavailable', 
                        'invoiced', 'processing', 'created', 'approved']

  - name: stg_customers
    description: "Cleaned customers data. One row per customer_id."
    columns:
      - name: customer_id
        description: "Unique identifier per order (not per person)"
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: "True unique customer identifier across orders"
        tests:
          - not_null

  - name: stg_order_items
    description: "Cleaned order line items. One row per item per order."
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: product_id
        description: "Foreign key to stg_products"
        tests:
          - not_null
      - name: price
        description: "Item price in BRL"
        tests:
          - not_null

  - name: stg_payments
    description: "Cleaned payments data. One order can have multiple payment rows."
    columns:
      - name: order_id
        description: "Foreign key to stg_orders"
        tests:
          - not_null
      - name: payment_value
        description: "Payment amount in BRL"
        tests:
          - not_null

  - name: stg_sellers
    description: "Cleaned sellers data. One row per seller."
    columns:
      - name: seller_id
        description: "Unique identifier for each seller"
        tests:
          - unique
          - not_null

  - name: stg_products
    description: "Cleaned products data. One row per product."
    columns:
      - name: product_id
        description: "Unique identifier for each product"
        tests:
          - unique
          - not_null

  - name: stg_reviews
    description: "Cleaned reviews data. One row per review."
    columns:
      - name: review_id
        description: "Unique identifier for each review"
        tests:
          - not_null
      - name: review_score
        description: "Review score between 1 and 5"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [1, 2, 3, 4, 5]

  - name: stg_category_translation
    description: "Maps Portuguese category names to English."
    columns:
      - name: category_name_portuguese
        description: "Original Portuguese category name"
        tests:
          - unique
          - not_null